spring:
  application:
    name: chat
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/chat/v1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework: ${LOGGING_LEVEL_SPRINGFRAMEWORK:INFO}
    com.prads.chat: ${LOGGING_LEVEL_PACKAGE:INFO}
    org.hibernate.SQL: ${LOGGING_LEVEL_SQL:OFF}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOGGING_LEVEL_SQL_BASICBINDER:OFF}